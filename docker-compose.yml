services:
  postgres:
    image: postgres:16-alpine
    container_name: shortlink-postgres
    environment:
      POSTGRES_DB: urlshortener
      POSTGRES_USER: urlshortener
      POSTGRES_PASSWORD: urlshortener
    ports:
      - "${POSTGRES_PORT:-5434}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U urlshortener -d urlshortener"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: shortlink-api
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${API_PORT:-8080}:8080"
    environment:
      PORT: "8080"
      DATABASE_URL: jdbc:postgresql://postgres:5432/urlshortener
      DATABASE_USERNAME: urlshortener
      DATABASE_PASSWORD: urlshortener
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:8080}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5500,http://127.0.0.1:5500,http://localhost:3000,http://localhost}
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL:-http://localhost:5500}
      JWT_SECRET: ${JWT_SECRET:-local-dev-only-change-me-shortlink-jwt-secret-key-32b}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-86400000}
      SPRING_AI_MODEL_CHAT: ${SPRING_AI_MODEL_CHAT:-none}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.0-flash}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/actuator/health"]
      interval: 20s
      timeout: 5s
      start_period: 50s
      retries: 5

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: shortlink-web
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${WEB_PORT:-5500}:80"
    environment:
      SHORTLINK_API_BASE: ${SHORTLINK_API_BASE:-http://localhost:8080}
      SHORTLINK_GITHUB_URL: ${SHORTLINK_GITHUB_URL:-https://github.com/HarsshitSri}
      SHORTLINK_LINKEDIN_URL: ${SHORTLINK_LINKEDIN_URL:-https://www.linkedin.com/in/harsshit}

volumes:
  postgres_data:
