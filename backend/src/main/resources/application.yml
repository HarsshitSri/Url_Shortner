server:
  port: ${PORT:8080}

spring:
  application:
    name: url-shortener
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5434/urlshortener}
    username: ${DATABASE_USERNAME:urlshortener}
    password: ${DATABASE_PASSWORD:urlshortener}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
  ai:
    # Keep AI off unless you set a Gemini key (avoids Vertex project-id startup failure)
    model:
      chat: ${SPRING_AI_MODEL_CHAT:none}
    google:
      genai:
        api-key: ${GEMINI_API_KEY:}
        chat:
          model: ${GEMINI_MODEL:gemini-2.0-flash}
          temperature: 0.2

app:
  base-url: ${APP_BASE_URL:http://localhost:8080}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5500,http://127.0.0.1:5500,http://localhost:3000}
  short-code:
    length: 6
    max-attempts: 5
  jwt:
    secret: ${JWT_SECRET:local-dev-only-change-me-shortlink-jwt-secret-key-32b}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  oauth:
    frontend-base-url: ${FRONTEND_BASE_URL:http://localhost:5500}
    google:
      client-id: ${GOOGLE_CLIENT_ID:}
      client-secret: ${GOOGLE_CLIENT_SECRET:}
    github:
      client-id: ${GITHUB_CLIENT_ID:}
      client-secret: ${GITHUB_CLIENT_SECRET:}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized

logging:
  level:
    com.urlshortener: INFO
