<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Signing in — ShortLink</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Sora:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
  <script src="js/theme.js"></script>
</head>
<body>
  <div class="atmosphere" aria-hidden="true"></div>
  <main class="shell auth-shell">
    <section class="auth-panel">
      <h1>Signing you in</h1>
      <p class="support" id="callbackStatus">Finishing OAuth…</p>
      <p id="authError" class="error-box" hidden></p>
      <p class="auth-switch"><a href="login.html">Back to login</a></p>
    </section>
  </main>
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/oauth-callback.js"></script>
</body>
</html>
