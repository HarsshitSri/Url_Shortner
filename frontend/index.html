<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShortLink — URL Shortener</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Sora:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="atmosphere" aria-hidden="true"></div>

  <main class="shell">
    <header class="brand-block">
      <p class="brand">ShortLink</p>
      <p class="tagline">Short links with a soft AI safety check — share faster, stay informed.</p>
      <div class="actions">
        <button type="button" id="tourBtn" class="btn btn-secondary">Take the tour</button>
        <a class="btn btn-ghost" href="#create">Skip to create</a>
      </div>
    </header>

    <section id="tour" class="tour-panel" hidden>
      <div class="tour-header">
        <h2 id="tourTitle">Tour</h2>
        <p id="tourNotice" class="notice" hidden></p>
      </div>
      <ol id="tourSteps" class="tour-steps"></ol>
    </section>

    <section id="create" class="create-panel">
      <h2>Create a short link</h2>
      <p class="support">Paste an http or https URL. We’ll shorten it and surface any safety notes.</p>

      <form id="createForm" class="create-form" novalidate>
        <div class="field-header">
          <label for="originalUrl">Destination URL</label>
          <label class="example-label" for="exampleLinks">
            <span class="visually-hidden">Example links</span>
            <select id="exampleLinks" class="example-select" aria-label="Example links">
              <option value="">Examples</option>
              <option value="https://example.com/docs/getting-started">HTTPS docs page</option>
              <option value="https://www.wikipedia.org/wiki/URL_shortening">Wikipedia article</option>
              <option value="http://example.com/legacy/page">HTTP (warning demo)</option>
              <option value="https://github.com/spring-projects/spring-boot">GitHub repo</option>
            </select>
          </label>
        </div>
        <div class="input-row">
          <input
            id="originalUrl"
            name="originalUrl"
            type="url"
            placeholder="https://example.com/your/long/path"
            maxlength="2048"
            required
          />
          <button type="submit" class="btn btn-primary" id="submitBtn">Shorten</button>
        </div>
      </form>

      <div id="errorBox" class="error-box" hidden></div>

      <div id="resultBox" class="result-box" hidden>
        <p class="result-label">Your short link</p>
        <a id="shortUrl" class="short-url" href="#" target="_blank" rel="noopener noreferrer"></a>
        <p id="safetyStatus" class="meta"></p>
        <ul id="warningsList" class="warnings"></ul>
        <button type="button" id="copyBtn" class="btn btn-secondary">Copy link</button>
      </div>
    </section>
  </main>

  <footer class="footer">
    <span>API: <code id="apiBaseLabel"></code></span>
  </footer>

  <script src="js/config.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
